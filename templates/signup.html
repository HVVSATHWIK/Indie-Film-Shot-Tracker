<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Shot Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 40px;
      padding-bottom: 40px;
      background-color: var(--bg-base);
    }
    .form-signup {
      max-width: 440px;
      padding: 2.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }
    .error-msg {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--red-hot);
      background: rgba(232, 64, 64, 0.1);
      border: 1px solid var(--red-hot);
      padding: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<main class="form-signup w-100 m-auto">
  <form method="POST">
    <div class="text-center mb-4">
      <div class="rec-indicator d-inline-flex mb-3" style="opacity:1">
        <span class="rec-dot"></span>
        <span class="rec-label">NEW CREW ENROLLMENT</span>
      </div>
      <h1 class="app-title h3 mb-1">REGISTRATION</h1>
      <p class="app-subtitle">CREATE ACCESS ACCOUNT</p>
    </div>

    {% if error %}
    <div class="error-msg text-center">{{ error }}</div>
    {% endif %}

    <div class="mb-3">
      <label class="field-label">DESIRED USERNAME</label>
      <input type="text" name="username" class="form-control fc-custom" placeholder="e.g. cam_op_1" required />
    </div>

    <div class="mb-3">
        <label class="field-label">PRODUCTION ROLE</label>
        <select name="role" class="form-select fc-custom" required>
            <option value="director">Director</option>
            <option value="ad">First AD</option>
            <option value="camera">Camera / DP</option>
        </select>
    </div>

    <div class="mb-4">
      <label class="field-label">ACCESS KEY / PASSWORD</label>
      <input type="password" name="password" class="form-control fc-custom" placeholder="••••••••" required />
    </div>

    <button class="btn btn-log w-100 mb-3" type="submit">CREATE ACCOUNT</button>
    
    <div class="text-center">
        <a href="{{ url_for('login') }}" class="app-subtitle" style="text-decoration: none; color: var(--text-mid); border-bottom: 1px dashed var(--text-dim);">BACK TO ACCESS TERMINAL</a>
    </div>
  </form>
</main>

</body>
</html>
